# Docker Compose for Development
# ================================
# Default: infrastructure services only (for running web server on host)
#   docker compose up -d
#   pnpm dev                          # web server on host at localhost:3000
#
# Full stack (everything in Docker):
#   docker compose --profile app up -d
#
# Services exposed to localhost:
#   Redis          → localhost:6379
#   ArangoDB       → localhost:8529   (web UI at same port)
#   Temporal gRPC  → localhost:7233
#   Temporal UI    → localhost:8080
#   PostgreSQL     → localhost:5432   (Temporal persistence only)

services:
  # ── Infrastructure (always started) ────────────────────────────────

  # Redis for cache and rate limiting
  redis:
    image: redis:7-alpine
    container_name: unerr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ArangoDB (graph knowledge store)
  arangodb:
    image: arangodb/arangodb:3.12
    container_name: unerr-arangodb
    ports:
      - "8529:8529"
    environment:
      ARANGO_ROOT_PASSWORD: ${ARANGO_ROOT_PASSWORD:-firstPassword12345}
    volumes:
      - arangodb_data:/var/lib/arangodb3
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "arangosh", "--server.password", "${ARANGO_ROOT_PASSWORD:-firstPassword12345}", "--javascript.execute-string", "db._version()" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL (Temporal persistence store — NOT for app data, app uses cloud Supabase)
  postgresql:
    image: pgvector/pgvector:pg13
    container_name: unerr-postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: temporal
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Temporal server (workflow orchestration)
  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: unerr-temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgresql
    depends_on:
      postgresql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "nc", "-z", "temporal", "7233" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # TEI Embedding Server (nomic-embed-text-v1.5)
  # Runs the embedding model in a dedicated container — the light worker calls it via HTTP.
  # For GPU production, swap image tag from cpu-latest to latest (CUDA) or add --dtype float16.
  tei:
    profiles: [ "app", "worker" ]
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: unerr-tei
    ports:
      - "8090:80"
    volumes:
      - tei_models:/data
    command: --model-id nomic-ai/nomic-embed-text-v1.5 --port 80
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G

  # TEI Reranker (BAAI/bge-reranker-v2-m3 — cross-encoder for search reranking)
  # Optional: improves hybrid search precision by re-scoring RRF candidates.
  # For GPU production, swap image tag from cpu-latest to latest (CUDA).
  tei-reranker:
    profiles: [ "app", "worker" ]
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: unerr-tei-reranker
    ports:
      - "8091:80"
    volumes:
      - tei_reranker_models:/data
    command: --model-id BAAI/bge-reranker-v2-m3 --port 80
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G

  # Temporal UI (web dashboard for workflow visibility)
  temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: unerr-temporal-ui
    ports:
      - "8080:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal
    restart: unless-stopped

  # ── Application (only with --profile app) ──────────────────────────

  # Next.js Application
  app:
    profiles: [ "app" ]
    build: .
    container_name: unerr-app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      # Override localhost URLs to Docker-internal hostnames
      - REDIS_URL=redis://redis:6379
      - TEMPORAL_ADDRESS=temporal:7233
      - ARANGODB_URL=http://arangodb:8529
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    depends_on:
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
      arangodb:
        condition: service_healthy
    restart: unless-stopped

  # Temporal heavy-compute worker (Phase 1: prepareWorkspace, runSCIP, parseRest)
  # network_mode: host — shares host network so workers can reach cloud Supabase/ArangoDB directly.
  # TEMPORAL_ADDRESS uses localhost since Docker DNS (service names) is unavailable in host mode.
  temporal-worker-heavy:
    profiles: [ "app", "worker" ]
    build:
      context: .
      dockerfile: Dockerfile.heavy-worker
    container_name: unerr-temporal-worker-heavy
    network_mode: host
    command: pnpm temporal:worker:heavy
    environment:
      - NODE_ENV=development
      - TEMPORAL_ADDRESS=localhost:7233
      - TASK_QUEUE=heavy-compute-queue
      - NODE_OPTIONS=--max-old-space-size=6144
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    volumes:
      - repo-indices:/data/repo-indices
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 8G

  # Temporal light-llm worker (TEI embedding via HTTP, LLM calls, DB writes)
  temporal-worker-light:
    profiles: [ "app", "worker" ]
    build:
      context: .
      dockerfile: Dockerfile.light-worker
    container_name: unerr-temporal-worker-light
    network_mode: host
    command: pnpm temporal:worker:light
    environment:
      - NODE_ENV=development
      - TEMPORAL_ADDRESS=localhost:7233
      - TASK_QUEUE=light-llm-queue
      - NODE_OPTIONS=--max-old-space-size=4096
      - TEI_URL=http://localhost:8090
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 4G

  # MCP Server (Phase 2: standalone HTTP server for AI agents)
  mcp-server:
    profiles: [ "app", "mcp" ]
    build:
      context: .
      dockerfile: Dockerfile.mcp-server
    container_name: unerr-mcp-server
    ports:
      - "8787:8787"
    environment:
      - NODE_ENV=production
      - MCP_SERVER_PORT=8787
      - MCP_SERVER_URL=http://localhost:8787
      - REDIS_URL=redis://redis:6379
      - ARANGODB_URL=http://arangodb:8529
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    depends_on:
      redis:
        condition: service_healthy
      arangodb:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://localhost:8787/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
  # ── Optional debugging tools ───────────────────────────────────────

  # Redis Commander — uncomment to enable web UI at http://localhost:8081
  # redis-commander:
  #   image: rediscommander/redis-commander:latest
  #   container_name: unerr-redis-commander
  #   environment:
  #     - REDIS_HOSTS=local:redis:6379
  #   ports:
  #     - "8081:8081"
  #   depends_on:
  #     - redis
  #   restart: unless-stopped

volumes:
  redis_data:
  arangodb_data:
  postgresql_data:
  repo-indices:
  tei_models:
  tei_reranker_models:
